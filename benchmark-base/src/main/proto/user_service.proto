syntax = "proto3";

package com.alipay.sofa.rpc.benchmark.proto;

option java_package = "com.alipay.sofa.rpc.benchmark.proto";
option java_outer_classname = "UserServiceProto";
option java_multiple_files = true;

service UserService {
    // Unary: get a single user by id
    rpc GetUser (GetUserRequest) returns (GetUserResponse) {}

    // Server Streaming: query users by page, server pushes each user one by one
    rpc ListUserServerStream (ListUserRequest) returns (stream GetUserResponse) {}

    // Client Streaming: client uploads a batch of users, server returns a summary
    rpc BatchCreateUser (stream CreateUserRequest) returns (BatchCreateResponse) {}

    // Bidirectional Streaming: client sends users, server echoes back each with verified mark
    rpc VerifyUserBiStream (stream VerifyUserRequest) returns (stream VerifyUserResponse) {}
}

message GetUserRequest {
    int64 id = 1;
}

message ListUserRequest {
    int32 page_no = 1;
    int32 page_size = 2;
}

message CreateUserRequest {
    int64 id = 1;
    string name = 2;
    string email = 3;
    string mobile = 4;
    string address = 5;
}

message VerifyUserRequest {
    int64 id = 1;
    string name = 2;
    string email = 3;
}

message GetUserResponse {
    int64 id = 1;
    string name = 2;
    string email = 3;
    string mobile = 4;
    string address = 5;
    int32 status = 6;
}

message BatchCreateResponse {
    int32 count = 1;
    string message = 2;
}

message VerifyUserResponse {
    int64 id = 1;
    string name = 2;
    bool verified = 3;
}
